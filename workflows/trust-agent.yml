name: Send Trust Agent Signal

on:
  push:
    branches:
      - main
      - master

jobs:
  send-signal:
    runs-on: ubuntu-latest

    steps:
      - name: Send signal to Trust Agent
        run: |
          curl -X POST https://<TA_ENDPOINT>/ingest \
            -H "Authorization: Bearer ${{ secrets.TA_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "user": "${{ github.actor }}",
              "event": "commit",
              "repo": "${{ github.repository }}"
            }'
